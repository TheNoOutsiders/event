<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNO — Ticket Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Math:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --purple: #7c3aed;
      --purple-light: #a855f7;
      --purple-dark: #4a1272;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --white: rgba(255,255,255,0.96);
      --white-soft: rgba(255,255,255,0.72);
      --border: rgba(255,255,255,0.13);
      --bg: #060608;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 20%, rgba(55,20,110,0.2), transparent 32%),
        radial-gradient(circle at 80% 15%, rgba(55,20,110,0.18), transparent 30%),
        linear-gradient(135deg, #060606 0%, #070210 42%, #0a0418 100%);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(90deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 120px);
      z-index: -1;
      pointer-events: none;
    }

    .shell {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 12px 28px rgba(0,0,0,0.28);
    }

    .header-brand {
      font-family: 'Noto Sans Math', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #fff 0%, #c084fc 40%, #7e22ce 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header-badge {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(107,33,168,0.22);
      border: 1px solid rgba(167,100,255,0.28);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--purple-light);
    }

    /* ── Card base ── */
    .card {
      padding: 22px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.03));
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 20px 50px rgba(0,0,0,0.36), 0 0 28px rgba(88,28,135,0.14);
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }

    /* ── Scanner viewport ── */
    #scanner-wrap {
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #scanner-wrap video {
      width: 100% !important;
      border-radius: 18px;
    }

    #qr-reader {
      width: 100% !important;
      border: none !important;
      padding: 0 !important;
    }

    #qr-reader__scan_region {
      border-radius: 18px;
      overflow: hidden;
    }

    #qr-reader__dashboard {
      display: none !important;
    }

    .scanner-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.3);
      font-size: 13px;
      letter-spacing: 0.4px;
      padding: 40px 0;
    }

    .scanner-placeholder svg {
      opacity: 0.3;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      min-height: 52px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(135deg, #0f0520 0%, #3b0764 42%, #4a1772 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 14px 30px rgba(0,0,0,0.3), 0 0 22px rgba(88,28,135,0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-stop {
      background: linear-gradient(135deg, #1a0505, #5a1010, #7f1d1d);
    }

    /* ── Manual input ── */
    .manual-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .input-shell {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
    }

    .input-shell input {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.13);
      background: linear-gradient(135deg, rgba(8,4,20,0.74), rgba(0,0,0,0.36));
      color: rgba(255,255,255,0.96);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-shell input:focus {
      border-color: rgba(167,100,255,0.5);
      box-shadow: 0 0 0 2px rgba(107,33,168,0.25), 0 0 20px rgba(88,28,135,0.24);
    }

    .input-shell input::placeholder {
      color: rgba(255,220,228,0.4);
      font-weight: 400;
      letter-spacing: 0.4px;
      text-transform: none;
    }

    .btn-check {
      min-width: 90px;
      width: auto;
      min-height: 48px;
      padding: 0 18px;
      font-size: 12px;
    }

    /* ── Result card ── */
    .result-card {
      display: none;
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.07), rgba(255,255,255,0.02));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 16px 40px rgba(0,0,0,0.32);
      animation: resultIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
    }

    .result-card.show { display: block; }

    @keyframes resultIn {
      from { opacity: 0; transform: translateY(14px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .status-banner {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.6px;
    }

    .status-banner.valid   { background: rgba(34,197,94,0.12);  border: 1px solid rgba(34,197,94,0.28);  color: #86efac; }
    .status-banner.invalid { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.28);  color: #fca5a5; }
    .status-banner.used    { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.28); color: #fcd34d; }
    .status-banner.unverified { background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.28); color: #a5b4fc; }

    .status-icon {
      font-size: 22px;
      line-height: 1;
      flex-shrink: 0;
    }

    .status-text strong {
      display: block;
      font-size: 15px;
      margin-bottom: 2px;
    }

    .status-text span {
      font-size: 12px;
      opacity: 0.8;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .detail-grid {
      display: grid;
      gap: 8px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .detail-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .detail-value {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      text-align: right;
    }

    .detail-value.code {
      font-family: 'Noto Sans Math', monospace;
      letter-spacing: 1.4px;
      font-size: 12px;
    }

    .method-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .method-pill.bkash  { background: rgba(232,0,116,0.15); border: 1px solid rgba(232,0,116,0.3);  color: #f472b6; }
    .method-pill.nagad  { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); color: #fdba74; }
    .method-pill.unknown { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5); }

    /* ── Stats strip ── */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-box {
      padding: 14px 10px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .stat-value {
      display: block;
      font-family: 'Noto Sans Math', sans-serif;
      font-size: 26px;
      line-height: 1;
      background: linear-gradient(180deg, #fff, #c084fc 55%, #4a1772 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stat-label {
      display: block;
      margin-top: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #a855f7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn.loading .btn-label { display: none; }
    .btn.loading .spinner   { display: block; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      padding: 12px 20px;
      border-radius: 14px;
      background: rgba(15,6,30,0.92);
      border: 1px solid rgba(167,100,255,0.3);
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
      white-space: nowrap;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.4s ease;
      opacity: 0;
      z-index: 50;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <span class="header-brand">The No Outsiders</span>
    <span class="header-badge">Scanner</span>
  </div>

  <!-- Stats -->
  <div class="stats-strip">
    <div class="stat-box">
      <span class="stat-value" id="statCheckedIn">—</span>
      <span class="stat-label">Checked In</span>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="statTotal">—</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-box">
      <span class="stat-value" id="statTickets">—</span>
      <span class="stat-label">Tickets In</span>
    </div>
  </div>

  <!-- Camera scanner -->
  <div class="card">
    <div class="card-title">Scan QR Code</div>
    <div id="scanner-wrap">
      <div id="qr-reader"></div>
      <div class="scanner-placeholder" id="scannerPlaceholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
          <rect x="7" y="7" width="4" height="4" rx="1"/>
          <rect x="13" y="7" width="4" height="4" rx="1"/>
          <rect x="7" y="13" width="4" height="4" rx="1"/>
          <path d="M13 13h1v1h-1zM15 15h2v2h-2zM13 17h2"/>
        </svg>
        <span>Camera not started</span>
      </div>
    </div>
    <div style="margin-top:14px;display:grid;gap:10px;">
      <button class="btn" id="startBtn" onclick="startScanner()">
        <span class="btn-label">Start Camera</span>
        <div class="spinner"></div>
      </button>
      <button class="btn btn-stop" id="stopBtn" onclick="stopScanner()" style="display:none;">
        Stop Camera
      </button>
    </div>
  </div>

  <!-- Manual entry -->
  <div class="card">
    <div class="card-title">Manual Code Entry</div>
    <div class="manual-row">
      <div class="input-shell">
        <input type="text" id="manualCode" placeholder="e.g. TNO-AB12CD"
               maxlength="12" oninput="this.value=this.value.toUpperCase()"
               onkeydown="if(event.key==='Enter') checkManual()" />
      </div>
      <button class="btn btn-check" onclick="checkManual()">
        <span class="btn-label">Check</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">

    <div class="status-banner" id="statusBanner">
      <span class="status-icon" id="statusIcon"></span>
      <div class="status-text">
        <strong id="statusTitle"></strong>
        <span id="statusSub"></span>
      </div>
    </div>

    <div class="detail-grid">
      <div class="detail-row">
        <span class="detail-label">Ticket Code</span>
        <span class="detail-value code" id="resCode">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Name</span>
        <span class="detail-value" id="resName">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Phone</span>
        <span class="detail-value" id="resPhone">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Tickets</span>
        <span class="detail-value" id="resTickets">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Payment</span>
        <span class="detail-value" id="resPayment">—</span>
      </div>
    </div>

  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── UPDATED URL ──────────────────────────────────────────
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx2WEysuk9c1mrHS_kQsWq706XZqhMg3ChwgyTr8-S9x3sOqDuuMMwioQpeq78719sk/exec';

  let scanner = null;
  let scanLock = false;

  // ── CORS-safe fetch ──────────────────────────────────────
  // Google Apps Script redirects to a different domain.
  // Using mode:'cors' with redirect:'follow' handles this correctly.
  async function apsFetch(url) {
    const res = await fetch(url, {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow'
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  // ── Stats ──────────────────────────────────────────────
  async function loadStats() {
    try {
      const data = await apsFetch(APPS_SCRIPT_URL + '?action=getStats');
      if (data.status === 'ok') {
        document.getElementById('statCheckedIn').textContent = data.checkedIn ?? '0';
        document.getElementById('statTotal').textContent     = data.total    ?? '0';
        document.getElementById('statTickets').textContent   = data.tickets  ?? '0';
      }
    } catch {
      // Stats are non-critical — fail silently, show dashes
    }
  }
  loadStats();

  // ── QR Scanner ─────────────────────────────────────────
  function startScanner() {
    const btn = document.getElementById('startBtn');
    btn.classList.add('loading');
    btn.disabled = true;

    document.getElementById('scannerPlaceholder').style.display = 'none';

    scanner = new Html5Qrcode('qr-reader');
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 240, height: 240 } },
      (decodedText) => {
        if (scanLock) return;
        scanLock = true;
        handleScan(decodedText);
        setTimeout(() => { scanLock = false; }, 3000);
      },
      () => {}
    ).then(() => {
      btn.classList.remove('loading');
      btn.style.display = 'none';
      document.getElementById('stopBtn').style.display = 'block';
    }).catch(() => {
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('scannerPlaceholder').style.display = 'flex';
      showToast('⚠️ Camera access denied or unavailable');
    });
  }

  function stopScanner() {
    if (scanner) {
      scanner.stop().then(() => {
        scanner = null;
        document.getElementById('startBtn').style.display = 'block';
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('scannerPlaceholder').style.display = 'flex';
      });
    }
  }

  // ── Handle scanned value ────────────────────────────────
  function handleScan(raw) {
    let code = raw.trim().toUpperCase();

    if (code.startsWith('{')) {
      try {
        const obj = JSON.parse(raw);
        code = (obj.ticketCode || '').toUpperCase();
      } catch { /* raw code fallback */ }
    }

    if (!code) { showToast('⚠️ Could not read ticket code'); return; }
    validateCode(code);
  }

  // ── Manual check ────────────────────────────────────────
  function checkManual() {
    const val = document.getElementById('manualCode').value.trim().toUpperCase();
    if (!val) { showToast('Enter a ticket code first'); return; }
    validateCode(val);
  }

  // ── Validate against Apps Script ────────────────────────
  async function validateCode(code) {
    const checkBtn = document.querySelector('.btn-check');
    checkBtn.classList.add('loading');
    checkBtn.disabled = true;

    try {
      const data = await apsFetch(`${APPS_SCRIPT_URL}?action=validate&code=${encodeURIComponent(code)}`);
      renderResult(data, code);
    } catch (err) {
      showToast('❌ Network error — check connection or re-deploy Apps Script');
      console.error('Validate error:', err);
    } finally {
      checkBtn.classList.remove('loading');
      checkBtn.disabled = false;
    }

    loadStats();
  }

  // ── Render result ────────────────────────────────────────
  function renderResult(data, code) {
    const card    = document.getElementById('resultCard');
    const banner  = document.getElementById('statusBanner');
    const icon    = document.getElementById('statusIcon');
    const title   = document.getElementById('statusTitle');
    const sub     = document.getElementById('statusSub');
    const resCode = document.getElementById('resCode');
    const resName = document.getElementById('resName');
    const resPhone= document.getElementById('resPhone');
    const resTix  = document.getElementById('resTickets');
    const resPay  = document.getElementById('resPayment');

    card.classList.remove('show');
    banner.className = 'status-banner';

    if (data.status === 'valid') {
      banner.classList.add('valid');
      icon.textContent  = '✅';
      title.textContent = 'Valid — Checked In';
      sub.textContent   = `Admitted at ${data.validatedAt}`;
    } else if (data.status === 'already_used') {
      banner.classList.add('used');
      icon.textContent  = '⚠️';
      title.textContent = 'Already Used';
      sub.textContent   = `Checked in at ${data.validatedAt}`;
    } else if (data.status === 'not_verified') {
      banner.classList.add('unverified');
      icon.textContent  = '🔵';
      title.textContent = 'Payment Not Verified';
      sub.textContent   = 'Registration received — awaiting manual payment check';
    } else {
      banner.classList.add('invalid');
      icon.textContent  = '❌';
      title.textContent = 'Invalid Ticket';
      sub.textContent   = 'Code not found in the system';
      resCode.textContent  = code;
      resName.textContent  = '—';
      resPhone.textContent = '—';
      resTix.textContent   = '—';
      resPay.innerHTML     = '—';
      void card.offsetWidth;
      card.classList.add('show');
      return;
    }

    resCode.textContent  = data.ticketCode  || code;
    resName.textContent  = data.name        || '—';
    resPhone.textContent = data.phone       || '—';
    resTix.textContent   = data.tickets ? `${data.tickets} ticket(s)` : '—';

    const method = (data.paymentMethod || '').toLowerCase();
    if (method === 'bkash') {
      resPay.innerHTML = '<span class="method-pill bkash">💳 bKash</span>';
    } else if (method === 'nagad') {
      resPay.innerHTML = '<span class="method-pill nagad">📱 Nagad</span>';
    } else {
      resPay.innerHTML = '<span class="method-pill unknown">—</span>';
    }

    void card.offsetWidth;
    card.classList.add('show');
  }

  // ── Toast ────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
  }
</script>
</body>
</html>
